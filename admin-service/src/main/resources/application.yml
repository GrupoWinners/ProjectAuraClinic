server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: admin-service

  # Profile ativo por padrão: dev. Em produção defina SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/admin_db
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Configurações JWT — chave em Base64 com mínimo 256 bits para HS256
jwt:
  chave-secreta: ${JWT_SECRET:dXNlQXN0cm9uZ1NlY3JldEtleUZvckpXVFRoaXNNdXN0QmVBdExlYXN0MjU2Qml0c0xvbmcx}
  expiracao: ${JWT_EXPIRACAO:86400000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logbook:
  filter:
    enabled: true
  format:
    style: json
  obfuscate:
    headers:
      - Authorization
    parameters:
      - senha
      - password

logging:
  level:
    br.com.clinica: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"