server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: agendamento-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/agendamento_db
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
            logger-level: FULL

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logbook:
  filter:
    enabled: true
  format:
    style: json
  obfuscate:
    headers:
      - Authorization
    parameters:
      - senha
      - password

logging:
  level:
    br.com.clinica: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

servicos:
  admin-service:
    url: ${ADMIN_SERVICE_URL:http://localhost:8081}
